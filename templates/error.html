<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Khaznati</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card animate-slide-up text-center">
            <div
                style="width: 80px; height: 80px; margin: 0 auto 2rem; background: var(--danger-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; color: var(--danger);">
                <i class="fas fa-exclamation-triangle"></i>
            </div>

            <h1 class="h2 mb-2">Oops!</h1>
            <p class="text-secondary mb-8">{{ message or 'Something went wrong. Please try again.' }}</p>

            <div class="flex gap-4 justify-center">
                <a href="javascript:history.back()" class="btn btn-ghost">
                    <i class="fas fa-arrow-left"></i> Go Back
                </a>
                <a href="/" class="btn btn-primary">
                    <i class="fas fa-home"></i> Home
                </a>
            </div>
        </div>
    </div>
</body>

</html>
