<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khaznati - خزنتي | Sign In</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='rtl.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Arabic:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <meta name="csrf-token" content="{{ csrf_token() }}">
</head>

<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card animate-slide-up">
            <div class="auth-header text-center">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="Khaznati" class="auth-logo mb-4"
                    style="max-height: 120px; width: auto;">
                <h1 class="auth-title h2" data-i18n="auth.login">Sign In</h1>
                <p class="auth-subtitle text-secondary" data-i18n="tagline">Your files, safe</p>
            </div>

            {% if error %}
            <div class="alert alert-error mb-4">
                <i class="fas fa-exclamation-circle mr-2"></i>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <div class="auth-tabs mb-6">
                <button class="auth-tab active" onclick="showPanel('login')" data-i18n="auth.login">Sign In</button>
                <button class="auth-tab" onclick="showPanel('register')" data-i18n="auth.register">Sign Up</button>
            </div>

            <!-- Login Form -->
            <form id="login-panel" class="auth-form" action="/login" method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="form-group mb-4">
                    <label class="form-label" for="login_email" data-i18n="auth.email">Email or Username</label>
                    <input type="text" name="email" id="login_email" class="form-input" placeholder="you@example.com"
                        required>
                </div>

                <div class="form-group mb-4">
                    <label class="form-label" for="login_password" data-i18n="auth.password">Password</label>
                    <input type="password" name="password" id="login_password" class="form-input" placeholder="••••••••"
                        required>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-full mb-4">
                    <span data-i18n="auth.login">Sign In</span> <i
                        class="fas fa-arrow-right ml-2 group-hover:translate-x-1 transition-transform"></i>
                </button>
            </form>

            <!-- Register Form -->
            <form id="register-panel" class="auth-form hidden" action="/register" method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="form-group mb-4">
                    <label class="form-label" for="reg_name" data-i18n="auth.username">Full Name</label>
                    <input type="text" name="name" id="reg_name" class="form-input" placeholder="John Doe" required>
                </div>

                <div class="form-group mb-4">
                    <label class="form-label" for="reg_email" data-i18n="auth.email">Email</label>
                    <input type="email" name="email" id="reg_email" class="form-input" placeholder="you@example.com"
                        required>
                </div>

                <div class="form-group mb-4">
                    <label class="form-label" for="reg_password" data-i18n="auth.password">Password</label>
                    <input type="password" name="password" id="reg_password" class="form-input" placeholder="••••••••"
                        required minlength="8">
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-full">
                    <span data-i18n="auth.register">Create Account</span> <i class="fas fa-user-plus ml-2"></i>
                </button>
            </form>

            <div class="auth-footer mt-6 pt-6 border-t text-center text-muted" style="font-size: 0.85rem;">
                <p data-i18n="footer.made_in">Made with ❤️ in Algeria</p>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='i18n.js') }}"></script>
    <script>
        function showPanel(panel) {
            const tabs = document.querySelectorAll('.auth-tab');
            const loginPanel = document.getElementById('login-panel');
            const registerPanel = document.getElementById('register-panel');

            tabs.forEach((tab, i) => {
                tab.classList.toggle('active', (panel === 'login' && i === 0) || (panel === 'register' && i === 1));
            });

            loginPanel.classList.toggle('hidden', panel !== 'login');
            registerPanel.classList.toggle('hidden', panel !== 'register');
        }
    </script>
</body>

</html>
